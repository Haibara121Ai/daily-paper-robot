name: Daily Paper Recommendation

on:
  schedule:
    - cron: "7 9 * * *"
      timezone: "Asia/Tokyo"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  recommend-paper:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run daily paper script
        run: |
          python daily_paper.py

      - name: Commit generated paper
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add papers seen_papers.json

          if git diff --cached --quiet; then
            echo "No new paper generated."
          else
            git commit -m "Add daily paper $(date +'%Y-%m-%d')"
            git push
          fi